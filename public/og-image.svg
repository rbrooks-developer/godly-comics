<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1A1A1A"/>

  <!-- Halftone dot pattern -->
  <defs>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1.5" fill="#D4AF37" opacity="0.15"/>
    </pattern>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE566"/>
      <stop offset="50%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Gold border lines -->
  <rect x="0" y="0" width="1200" height="8" fill="#D4AF37"/>
  <rect x="0" y="622" width="1200" height="8" fill="#D4AF37"/>
  <rect x="0" y="0" width="8" height="630" fill="#D4AF37"/>
  <rect x="1192" y="0" width="8" height="630" fill="#D4AF37"/>

  <!-- Logo G placeholder -->
  <text x="180" y="380" font-family="Georgia,serif" font-size="260" font-weight="bold" fill="url(#goldGrad)" text-anchor="middle">G</text>

  <!-- Title text -->
  <text x="660" y="260" font-family="Georgia,serif" font-size="96" font-weight="bold" fill="#D4AF37" text-anchor="middle" letter-spacing="8">GODLY COMICS</text>

  <!-- Divider -->
  <rect x="400" y="300" width="520" height="4" fill="#D4AF37"/>

  <!-- Tagline -->
  <text x="660" y="380" font-family="Georgia,serif" font-size="42" fill="#FFE566" text-anchor="middle" letter-spacing="3">Divine Stories for Every Hero</text>

  <!-- URL -->
  <text x="660" y="550" font-family="Arial,sans-serif" font-size="28" fill="#B8860B" text-anchor="middle" letter-spacing="2">godlycomics.com</text>
</svg>
